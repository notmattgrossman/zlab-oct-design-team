<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCT Fixation Target — Snowflake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%   { transform: scale(0.78); }
    50%  { transform: scale(1.0);  }
    100% { transform: scale(0.78); }
  }

  /* subtle scanline overlay for that retro feel */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    border-radius: 50%;
  }

  .label {
    position: absolute;
    bottom: -36px;
    color: rgba(180, 220, 255, 0.4);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="wrapper">
  <canvas id="snowfield" width="256" height="256" style="width:512px;height:512px;position:absolute;"></canvas>
  <canvas id="snowflake" width="256" height="256" style="width:512px;height:512px;"></canvas>
  <div class="scanlines"></div>
  <div class="label">fixation target</div>
</div>

<script>
const canvas = document.getElementById('snowflake');
const ctx = canvas.getContext('2d');
const W = 128, H = 128;

// ---- Static snow particle canvas ----
const snowCanvas = document.getElementById('snowfield');
const sctx = snowCanvas.getContext('2d');

// Offscreen pixel canvas (128x128 upscaled to 256x256)
const off = document.createElement('canvas');
off.width = W; off.height = H;
const oc = off.getContext('2d');

// ---- Palette (icy winter colors) ----
const PALETTE = {
  bg:         [2,   4,  12],
  core:       [255, 255, 255],
  coreGlow:   [220, 240, 255],
  ice1:       [180, 220, 255],
  ice2:       [140, 200, 255],
  ice3:       [100, 180, 240],
  crystal:    [200, 230, 255],
  dust:       [60,  100, 140],
  snow:       [240, 250, 255],
  snowDim:    [180, 200, 220],
};

// ---- Snow particles (static background) ----
const snowParticles = [];
for (let i = 0; i < 400; i++) {
  snowParticles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    b: 0.08 + Math.random() * 0.9,
    dim: Math.random() < 0.3,
    size: Math.random() < 0.08 ? 2 : 1
  });
}

// ---- Snowflake structure (6-fold symmetry) ----
// Each snowflake arm extends from center with branches and sub-branches
const FLAKE_PARTICLES = [];

const NUM_ARMS = 6;
const ARM_LENGTH = 50;
const CORE_SIZE = 3;

// --- Main arms with branches ---
for (let arm = 0; arm < NUM_ARMS; arm++) {
  const armAngle = (arm / NUM_ARMS) * Math.PI * 2;
  
  // Main spine of the arm
  for (let i = 0; i < 80; i++) {
    const frac = i / 80;
    const r = frac * ARM_LENGTH;
    const bx = Math.cos(armAngle) * r;
    const by = Math.sin(armAngle) * r;
    
    // Brightness peaks near center, fades at tips
    const brightness = 0.6 + (1 - frac) * 0.4;
    const isBright = Math.random() < 0.15;
    
    FLAKE_PARTICLES.push({
      bx, by, frac, arm,
      brightness,
      size: isBright ? 2 : 1,
      type: 'spine'
    });
  }
  
  // Side branches at regular intervals
  const BRANCH_COUNT = 8;
  for (let b = 0; b < BRANCH_COUNT; b++) {
    const branchFrac = (b + 1) / (BRANCH_COUNT + 1);
    const branchOriginR = branchFrac * ARM_LENGTH;
    const branchAngle = armAngle + Math.PI / 6; // 30 degree branches
    const branchAngle2 = armAngle - Math.PI / 6;
    
    // First branch direction
    for (let j = 0; j < 15; j++) {
      const f = j / 15;
      const branchLen = (1 - branchFrac) * ARM_LENGTH * 0.4;
      const bx = Math.cos(armAngle) * branchOriginR + Math.cos(branchAngle) * f * branchLen;
      const by = Math.sin(armAngle) * branchOriginR + Math.sin(branchAngle) * f * branchLen;
      
      const brightness = 0.5 + (1 - f) * 0.4 * (1 - branchFrac * 0.3);
      
      FLAKE_PARTICLES.push({
        bx, by,
        frac: branchFrac + f * 0.1,
        arm,
        brightness,
        size: 1,
        type: 'branch'
      });
    }
    
    // Second branch direction (opposite side)
    for (let j = 0; j < 15; j++) {
      const f = j / 15;
      const branchLen = (1 - branchFrac) * ARM_LENGTH * 0.4;
      const bx = Math.cos(armAngle) * branchOriginR + Math.cos(branchAngle2) * f * branchLen;
      const by = Math.sin(armAngle) * branchOriginR + Math.sin(branchAngle2) * f * branchLen;
      
      const brightness = 0.5 + (1 - f) * 0.4 * (1 - branchFrac * 0.3);
      
      FLAKE_PARTICLES.push({
        bx, by,
        frac: branchFrac + f * 0.1,
        arm,
        brightness,
        size: 1,
        type: 'branch'
      });
    }
  }
  
  // Ice crystals scattered along arms
  for (let i = 0; i < 30; i++) {
    const frac = Math.random();
    const r = frac * ARM_LENGTH;
    const spread = (Math.random() - 0.5) * 4;
    const perpAngle = armAngle + Math.PI / 2;
    const bx = Math.cos(armAngle) * r + Math.cos(perpAngle) * spread;
    const by = Math.sin(armAngle) * r + Math.sin(perpAngle) * spread;
    
    FLAKE_PARTICLES.push({
      bx, by, frac, arm,
      brightness: 0.3 + Math.random() * 0.5,
      size: 1,
      type: 'crystal'
    });
  }
}

// --- Central hexagonal core ---
const HEXAGON_R = 8;
for (let i = 0; i < 6; i++) {
  const angle1 = (i / 6) * Math.PI * 2;
  const angle2 = ((i + 1) / 6) * Math.PI * 2;
  
  // Draw lines between hexagon vertices
  for (let j = 0; j < 15; j++) {
    const t = j / 15;
    const x1 = Math.cos(angle1) * HEXAGON_R;
    const y1 = Math.sin(angle1) * HEXAGON_R;
    const x2 = Math.cos(angle2) * HEXAGON_R;
    const y2 = Math.sin(angle2) * HEXAGON_R;
    
    const bx = x1 + (x2 - x1) * t;
    const by = y1 + (y2 - y1) * t;
    
    FLAKE_PARTICLES.push({
      bx, by,
      frac: 0,
      arm: -1,
      brightness: 0.9,
      size: 1,
      type: 'hexagon'
    });
  }
}

// Inner dense core particles
for (let i = 0; i < 150; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = Math.random() * CORE_SIZE;
  const bx = Math.cos(theta) * r;
  const by = Math.sin(theta) * r;
  
  FLAKE_PARTICLES.push({
    bx, by,
    frac: 0,
    arm: -1,
    brightness: 0.8 + Math.random() * 0.2,
    size: 1,
    type: 'core'
  });
}

// ---- Draw snow particles once on static canvas ----
(function drawSnow() {
  const snowOff = document.createElement('canvas');
  snowOff.width = W; snowOff.height = H;
  const soc = snowOff.getContext('2d');
  const imgData = soc.createImageData(W, H);
  // transparent bg
  for (let i = 0; i < W * H * 4; i += 4) {
    imgData.data[i+3] = 0;
  }
  for (const s of snowParticles) {
    const c = s.dim ? PALETTE.snowDim : PALETTE.snow;
    const a = Math.round(s.b * 200);
    const x = Math.round(s.x), y = Math.round(s.y);
    if (x < 0 || x >= W || y < 0 || y >= H) continue;
    const idx = (y * W + x) * 4;
    imgData.data[idx]   = c[0];
    imgData.data[idx+1] = c[1];
    imgData.data[idx+2] = c[2];
    imgData.data[idx+3] = a;
    // slightly larger bright snow
    if (s.size === 2 && x+1 < W) {
      const idx2 = (y * W + (x+1)) * 4;
      imgData.data[idx2]   = c[0];
      imgData.data[idx2+1] = c[1];
      imgData.data[idx2+2] = c[2];
      imgData.data[idx2+3] = Math.round(a * 0.5);
    }
  }
  soc.putImageData(imgData, 0, 0);
  sctx.drawImage(snowOff, 0, 0, 256, 256);
})();

// ---- Render ----
function lerp(a, b, t) { return a + (b - a) * t; }

function setPixel(imgData, x, y, r, g, b, a=255) {
  x = Math.round(x); y = Math.round(y);
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  const i = (y * W + x) * 4;
  // additive blend for glow
  imgData.data[i]   = Math.min(255, imgData.data[i]   + r * (a/255));
  imgData.data[i+1] = Math.min(255, imgData.data[i+1] + g * (a/255));
  imgData.data[i+2] = Math.min(255, imgData.data[i+2] + b * (a/255));
  imgData.data[i+3] = 255;
}

let angle = 0;

function draw(ts) {
  angle = (ts / 6000) * Math.PI * 2; // full rotation every 6s

  const imgData = oc.createImageData(W, H);

  // Fill background
  for (let i = 0; i < W * H * 4; i += 4) {
    imgData.data[i]   = PALETTE.bg[0];
    imgData.data[i+1] = PALETTE.bg[1];
    imgData.data[i+2] = PALETTE.bg[2];
    imgData.data[i+3] = 255;
  }

  const cx = W / 2, cy = H / 2;

  // Draw snowflake particles with rotation
  for (const p of FLAKE_PARTICLES) {
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    const rx = p.bx * cosA - p.by * sinA;
    const ry = p.bx * sinA + p.by * cosA;
    const px = cx + rx;
    const py = cy + ry;

    let col;
    if (p.type === 'core' || p.type === 'hexagon') {
      // Bright white core
      col = PALETTE.core;
    } else if (p.type === 'spine') {
      // Main arms — gradient from core glow to icy blue
      col = [
        lerp(PALETTE.coreGlow[0], PALETTE.ice1[0], p.frac),
        lerp(PALETTE.coreGlow[1], PALETTE.ice1[1], p.frac),
        lerp(PALETTE.coreGlow[2], PALETTE.ice1[2], p.frac),
      ];
    } else if (p.type === 'branch') {
      // Branches — cooler blues
      col = [
        lerp(PALETTE.ice2[0], PALETTE.ice3[0], p.frac),
        lerp(PALETTE.ice2[1], PALETTE.ice3[1], p.frac),
        lerp(PALETTE.ice2[2], PALETTE.ice3[2], p.frac),
      ];
    } else {
      // Crystal particles
      col = PALETTE.crystal;
    }

    const alpha = Math.round(Math.max(0, Math.min(1, p.brightness)) * 220);
    if (p.size === 2) {
      setPixel(imgData, px,   py,   col[0], col[1], col[2], alpha);
      setPixel(imgData, px+1, py,   col[0], col[1], col[2], Math.round(alpha*0.5));
      setPixel(imgData, px,   py+1, col[0], col[1], col[2], Math.round(alpha*0.5));
    } else {
      setPixel(imgData, px, py, col[0], col[1], col[2], alpha);
    }
  }

  // Core glow (soft gradient)
  const GLOW_R = 10;
  for (let dy = -GLOW_R; dy <= GLOW_R; dy++) {
    for (let dx = -GLOW_R; dx <= GLOW_R; dx++) {
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > GLOW_R) continue;
      const strength = Math.pow(1 - d / GLOW_R, 2.5);
      const col = d < CORE_SIZE
        ? PALETTE.core
        : PALETTE.coreGlow;
      setPixel(imgData, cx + dx, cy + dy,
        col[0], col[1], col[2],
        Math.round(strength * 255));
    }
  }

  // Hard center pixel — the fixation dot
  setPixel(imgData, cx, cy, 255, 255, 255, 255);
  setPixel(imgData, cx+1, cy, 255, 255, 255, 200);
  setPixel(imgData, cx-1, cy, 255, 255, 255, 200);
  setPixel(imgData, cx, cy+1, 255, 255, 255, 200);
  setPixel(imgData, cx, cy-1, 255, 255, 255, 200);

  oc.putImageData(imgData, 0, 0);

  // Scale up to display canvas
  ctx.clearRect(0, 0, 256, 256);
  ctx.drawImage(off, 0, 0, 256, 256);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
