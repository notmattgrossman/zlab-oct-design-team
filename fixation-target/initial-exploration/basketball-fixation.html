<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCT Fixation Target — Basketball</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .label {
    position: absolute;
    bottom: -36px;
    color: rgba(220, 140, 80, 0.35);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="wrapper">
  <canvas id="basketball" width="512" height="512"></canvas>
  <div class="label">fixation target</div>
</div>

<script>
const canvas = document.getElementById('basketball');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const cx = W / 2;
const cy = H / 2;
const BALL_R = 200;

// ---- Animation state ----
const ROT_PERIOD = 4000; // full rotation every 4s

// Basketball seam curves (4 main arcs forming the classic pattern)
function drawSeams(ctx, rotation) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  
  ctx.strokeStyle = 'rgba(20, 20, 20, 0.85)';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  
  // Classic basketball has curved seams
  // Draw 2 mirrored S-curves
  
  // Left curve
  ctx.beginPath();
  ctx.moveTo(-BALL_R * 0.9, 0);
  ctx.bezierCurveTo(
    -BALL_R * 0.5, -BALL_R * 0.7,
    BALL_R * 0.5, -BALL_R * 0.7,
    BALL_R * 0.9, 0
  );
  ctx.stroke();
  
  // Right curve (mirrored)
  ctx.beginPath();
  ctx.moveTo(-BALL_R * 0.9, 0);
  ctx.bezierCurveTo(
    -BALL_R * 0.5, BALL_R * 0.7,
    BALL_R * 0.5, BALL_R * 0.7,
    BALL_R * 0.9, 0
  );
  ctx.stroke();
  
  // Rotate 90 degrees and draw the other pair
  ctx.rotate(Math.PI / 2);
  
  ctx.beginPath();
  ctx.moveTo(-BALL_R * 0.9, 0);
  ctx.bezierCurveTo(
    -BALL_R * 0.5, -BALL_R * 0.7,
    BALL_R * 0.5, -BALL_R * 0.7,
    BALL_R * 0.9, 0
  );
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(-BALL_R * 0.9, 0);
  ctx.bezierCurveTo(
    -BALL_R * 0.5, BALL_R * 0.7,
    BALL_R * 0.5, BALL_R * 0.7,
    BALL_R * 0.9, 0
  );
  ctx.stroke();
  
  ctx.restore();
}

// Pebbled texture overlay
function drawTexture(ctx) {
  for (let i = 0; i < 3000; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * BALL_R;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < BALL_R) {
      // Calculate lighting on sphere for texture depth
      const nx = dx / BALL_R;
      const ny = dy / BALL_R;
      const nz = Math.sqrt(Math.max(0, 1 - nx*nx - ny*ny));
      const light = Math.max(0, -nx * 0.4 - ny * 0.5 + nz * 0.8);
      
      const size = 0.3 + Math.random() * 0.8;
      const isDark = Math.random() < 0.5;
      const opacity = (0.02 + Math.random() * 0.06) * light;
      
      ctx.fillStyle = isDark 
        ? `rgba(0, 0, 0, ${opacity})`
        : `rgba(255, 220, 180, ${opacity})`;
      ctx.fillRect(x, y, size, size);
    }
  }
}

function draw(ts) {
  const rotation = (ts / ROT_PERIOD) * Math.PI * 2;

  // Clear canvas
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // ---- Draw basketball with radial gradient for 3D effect ----
  const gradient = ctx.createRadialGradient(
    cx - BALL_R * 0.3, cy - BALL_R * 0.3, BALL_R * 0.1,
    cx, cy, BALL_R
  );
  
  gradient.addColorStop(0, '#ffa060');    // highlight
  gradient.addColorStop(0.4, '#e67820');  // mid-tone
  gradient.addColorStop(0.8, '#b45014');  // darker
  gradient.addColorStop(1, '#783210');    // shadow edge
  
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(cx, cy, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // ---- Ambient glow around ball ----
  const glowGradient = ctx.createRadialGradient(cx, cy, BALL_R, cx, cy, BALL_R + 40);
  glowGradient.addColorStop(0, 'rgba(230, 120, 40, 0.2)');
  glowGradient.addColorStop(1, 'rgba(230, 120, 40, 0)');
  
  ctx.fillStyle = glowGradient;
  ctx.beginPath();
  ctx.arc(cx, cy, BALL_R + 40, 0, Math.PI * 2);
  ctx.fill();

  // ---- Texture ----
  drawTexture(ctx);

  // ---- Seams ----
  drawSeams(ctx, rotation);

  // ---- Center fixation dot (white cross) ----
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // Subtle cross for precise fixation
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.fillRect(cx - 8, cy - 0.5, 16, 1);
  ctx.fillRect(cx - 0.5, cy - 8, 1, 16);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
