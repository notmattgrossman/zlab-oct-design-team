
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;background:#000;border-radius:12px;overflow:hidden;">

  <!-- 1. Segmented ring -->
  <div style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px 24px;gap:16px;">
    <svg width="160" height="160" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="#ffffff" stroke-width="6"
        stroke-dasharray="43 11" stroke-linecap="round"
        style="transform-origin:50px 50px;animation:s1 6s linear infinite"/>
      <circle cx="50" cy="50" r="3.5" fill="#ffffff"/>
    </svg>
    <span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;">Segmented ring</span>
  </div>

  <!-- 2. Cross + ring -->
  <div style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px 24px;gap:16px;">
    <svg width="160" height="160" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#ffffff" stroke-width="1"
        stroke-dasharray="12 6"
        style="transform-origin:50px 50px;animation:s2 8s linear infinite"/>
      <g style="transform-origin:50px 50px;animation:p2 2.5s ease-in-out infinite">
        <line x1="50" y1="2"  x2="50" y2="98" stroke="#ffffff" stroke-width="1.5"/>
        <line x1="2"  y1="50" x2="98" y2="50" stroke="#ffffff" stroke-width="1.5"/>
        <circle cx="50" cy="50" r="9" fill="#000000"/>
      </g>
      <circle cx="50" cy="50" r="3" fill="#ffffff"/>
    </svg>
    <span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;">Cross + ring</span>
  </div>

  <!-- 3. Dot ring -->
  <div style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px 24px;gap:16px;">
    <svg width="160" height="160" viewBox="0 0 100 100">
      <g style="transform-origin:50px 50px;animation:s3 5s linear infinite">
        <circle cx="84"  cy="50"   r="3" fill="#ffffff"/>
        <circle cx="79.4" cy="67"  r="3" fill="#ffffff"/>
        <circle cx="67"  cy="79.4" r="3" fill="#ffffff"/>
        <circle cx="50"  cy="84"   r="3" fill="#ffffff"/>
        <circle cx="33"  cy="79.4" r="3" fill="#ffffff"/>
        <circle cx="20.6" cy="67"  r="3" fill="#ffffff"/>
        <circle cx="16"  cy="50"   r="3" fill="#ffffff"/>
        <circle cx="20.6" cy="33"  r="3" fill="#ffffff"/>
        <circle cx="33"  cy="20.6" r="3" fill="#ffffff"/>
        <circle cx="50"  cy="16"   r="3" fill="#ffffff"/>
        <circle cx="67"  cy="20.6" r="3" fill="#ffffff"/>
        <circle cx="79.4" cy="33"  r="3" fill="#ffffff"/>
      </g>
      <circle cx="50" cy="50" r="3.5" fill="#ffffff"/>
    </svg>
    <span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;">Dot ring</span>
  </div>

  <!-- 4. Ring + ticks -->
  <div style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px 24px;gap:16px;">
    <svg width="160" height="160" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#ffffff" stroke-width="0.75"
        style="transform-origin:50px 50px;animation:f4 2s ease-in-out infinite"/>
      <g style="transform-origin:50px 50px;animation:s4 4s linear infinite">
        <line x1="50" y1="16" x2="50" y2="26" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="50" y1="74" x2="50" y2="84" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="50" x2="26" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="74" y1="50" x2="84" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <circle cx="50" cy="50" r="2.5" fill="#ffffff"/>
    </svg>
    <span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;">Ring + ticks</span>
  </div>

</div>

<style>
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  @keyframes s1 { to { transform: rotate(360deg); } }
  @keyframes s2 { to { transform: rotate(-360deg); } }
  @keyframes p2 { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
  @keyframes s3 { to { transform: rotate(360deg); } }
  @keyframes f4 { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
  @keyframes s4 { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { svg * { animation: none !important; } }
</style>
