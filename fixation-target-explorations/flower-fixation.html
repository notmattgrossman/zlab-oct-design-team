<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCT Fixation Target — Blooming Flower</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .label {
    position: absolute;
    bottom: -36px;
    color: rgba(180, 140, 180, 0.35);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="wrapper">
  <canvas id="flower" width="512" height="512"></canvas>
  <div class="label">fixation target</div>
</div>

<script>
const canvas = document.getElementById('flower');
const ctx = canvas.getContext('2d');
const W = 512, H = 512;
const cx = W / 2, cy = H / 2;

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

// Draw realistic petal with gradients and shading
function drawPetal(ctx, cx, cy, angle, length, width, bloom, colorOuter, colorInner) {
  if (bloom <= 0) return;
  
  const L = length * bloom;
  const W2 = width * bloom;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  
  // Create petal path
  ctx.beginPath();
  ctx.moveTo(0, 0);
  
  // Bezier curve for natural petal shape
  ctx.bezierCurveTo(
    W2 * 0.5, L * 0.3,    // control point 1
    W2, L * 0.6,          // control point 2
    W2 * 0.3, L           // tip (slightly curved)
  );
  
  ctx.bezierCurveTo(
    0, L * 0.9,           // control point 3
    -W2 * 0.3, L          // tip other side
  );
  
  ctx.bezierCurveTo(
    -W2, L * 0.6,         // control point 4
    -W2 * 0.5, L * 0.3,   // control point 5
    0, 0                  // back to base
  );
  
  ctx.closePath();
  
  // Main petal gradient
  const gradient = ctx.createRadialGradient(0, L * 0.4, 0, 0, L * 0.4, L * 0.8);
  gradient.addColorStop(0, colorInner);
  gradient.addColorStop(0.7, colorOuter);
  gradient.addColorStop(1, `rgba(${colorOuter.match(/\d+/g).slice(0,3).join(',')}, 0.6)`);
  
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Add subtle vein lines
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, L);
  ctx.stroke();
  
  // Side veins
  for (let i = 0; i < 3; i++) {
    const vY = L * (0.3 + i * 0.2);
    const vW = W2 * (0.6 - i * 0.15);
    ctx.beginPath();
    ctx.moveTo(0, vY);
    ctx.quadraticCurveTo(vW * 0.6, vY + L * 0.1, vW * 0.8, vY + L * 0.2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, vY);
    ctx.quadraticCurveTo(-vW * 0.6, vY + L * 0.1, -vW * 0.8, vY + L * 0.2);
    ctx.stroke();
  }
  
  ctx.restore();
}

// Draw stamen
function drawStamen(ctx, cx, cy, angle, length, bloom) {
  if (bloom <= 0) return;
  
  const L = length * bloom;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  
  // Filament
  ctx.strokeStyle = 'rgba(255, 240, 150, 0.9)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, L);
  ctx.stroke();
  
  // Anther (pollen tip)
  const antherGrad = ctx.createRadialGradient(0, L, 0, 0, L, 4);
  antherGrad.addColorStop(0, '#ffe680');
  antherGrad.addColorStop(1, '#ffb020');
  ctx.fillStyle = antherGrad;
  ctx.beginPath();
  ctx.ellipse(0, L, 3, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

// Animation timing
const BLOOM_TIME = 3000;
const HOLD_OPEN = 1500;
const CLOSE_TIME = 2000;
const HOLD_CLOSED = 600;
const CYCLE = BLOOM_TIME + HOLD_OPEN + CLOSE_TIME + HOLD_CLOSED;
const ROT_PERIOD = 20000;

function getBloom(ts) {
  const t = ts % CYCLE;
  if (t < BLOOM_TIME) {
    const x = t / BLOOM_TIME;
    const ease = x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;
    return 0.4 + ease * 0.6;
  } else if (t < BLOOM_TIME + HOLD_OPEN) {
    return 1;
  } else if (t < BLOOM_TIME + HOLD_OPEN + CLOSE_TIME) {
    const x = (t - BLOOM_TIME - HOLD_OPEN) / CLOSE_TIME;
    const ease = x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;
    return 1 - ease * 0.6;
  } else {
    return 0.4;
  }
}

function draw(ts) {
  const bloom = getBloom(ts);
  const rotation = (ts / ROT_PERIOD) * Math.PI * 2;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Soft glow behind flower
  const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180 * bloom);
  glowGrad.addColorStop(0, 'rgba(255, 200, 220, 0.15)');
  glowGrad.addColorStop(0.5, 'rgba(255, 150, 180, 0.08)');
  glowGrad.addColorStop(1, 'rgba(255, 100, 140, 0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // Outer petals (5 petals) - realistic pink rose
  const NUM_OUTER = 5;
  for (let i = 0; i < NUM_OUTER; i++) {
    const angle = rotation + (i / NUM_OUTER) * Math.PI * 2;
    const petalBloom = clamp(bloom * 1.1 - (i % 2) * 0.08, 0, 1);
    drawPetal(ctx, cx, cy, angle, 140, 50, petalBloom, 
      'rgb(220, 100, 140)', 'rgb(255, 200, 220)');
  }

  // Middle ring petals (5 petals, offset)
  for (let i = 0; i < NUM_OUTER; i++) {
    const angle = rotation + (i / NUM_OUTER) * Math.PI * 2 + Math.PI / NUM_OUTER;
    const petalBloom = clamp(bloom * 1.05 - 0.05, 0, 1);
    drawPetal(ctx, cx, cy, angle, 100, 38, petalBloom,
      'rgb(240, 140, 170)', 'rgb(255, 220, 230)');
  }

  // Inner petals (4 petals)
  const NUM_INNER = 4;
  for (let i = 0; i < NUM_INNER; i++) {
    const angle = rotation + (i / NUM_INNER) * Math.PI * 2 + Math.PI / 4;
    const petalBloom = clamp(bloom * 1.0, 0, 1);
    drawPetal(ctx, cx, cy, angle, 65, 28, petalBloom,
      'rgb(255, 180, 200)', 'rgb(255, 235, 240)');
  }

  // Stamens
  const NUM_STAMEN = 16;
  for (let i = 0; i < NUM_STAMEN; i++) {
    const angle = rotation * 0.5 + (i / NUM_STAMEN) * Math.PI * 2;
    const sBloom = clamp(bloom * 1.2 - 0.15, 0, 1);
    drawStamen(ctx, cx, cy, angle, 35, sBloom);
  }

  // Center pistil
  const coreBloom = clamp(bloom * 1.3 - 0.2, 0, 1);
  const coreR = 12 * coreBloom;
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  coreGrad.addColorStop(0, '#a0d860');
  coreGrad.addColorStop(0.6, '#88c040');
  coreGrad.addColorStop(1, '#60a020');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
  ctx.fill();

  // Center texture dots
  if (coreBloom > 0.3) {
    ctx.fillStyle = 'rgba(120, 140, 40, 0.4)';
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const r = coreR * 0.6;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Fixation dot
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
  ctx.fillRect(cx - 8, cy - 0.5, 16, 1);
  ctx.fillRect(cx - 0.5, cy - 8, 1, 16);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
